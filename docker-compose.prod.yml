version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: medical_assistant
      POSTGRES_USER: medical_assistant
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_assistant -d medical_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  medical-assistant:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APP_ENV: prod
      JSON_LOGS: "true"
      DATABASE_URL: postgresql+psycopg://medical_assistant:change-me@postgres:5432/medical_assistant
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      OCR_ENABLED: "true"
    volumes:
      - ./uploads:/app/uploads
      - ./credentials:/app/credentials:ro
      - ./secrets:/app/secrets:ro

volumes:
  postgres_data:
