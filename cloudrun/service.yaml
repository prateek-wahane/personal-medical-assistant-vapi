apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: personal-medical-assistant
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 300
      serviceAccountName: personal-medical-assistant-sa
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/personal-medical-assistant/app:latest
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: prod
            - name: JSON_LOGS
              value: "true"
            - name: DATABASE_URL
              value: postgresql+psycopg://USER:PASSWORD@HOST:5432/medical_assistant
            - name: OCR_ENABLED
              value: "true"
            - name: CORS_ALLOWED_ORIGINS
              value: https://YOUR_FRONTEND_DOMAIN
            - name: AUTH_SECRET_KEY_FILE
              value: /secrets/auth-secret
            - name: VAPI_WEBHOOK_SECRET_FILE
              value: /secrets/vapi-webhook-secret
            - name: GOOGLE_CLIENT_SECRETS_FILE
              value: /secrets/google-client-secret.json
            - name: GOOGLE_TOKEN_FILE
              value: /secrets/google-token.json
          volumeMounts:
            - name: app-secrets
              mountPath: /secrets
      volumes:
        - name: app-secrets
          secret:
            secretName: personal-medical-assistant-secrets
