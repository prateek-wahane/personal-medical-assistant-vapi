name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: medical_assistant_test
          POSTGRES_USER: medical_assistant
          POSTGRES_PASSWORD: medical_assistant
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U medical_assistant -d medical_assistant_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://medical_assistant:medical_assistant@localhost:5432/medical_assistant_test
        run: alembic upgrade head

      - name: Run tests
        run: pytest
